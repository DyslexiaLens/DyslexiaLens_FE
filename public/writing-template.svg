<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1130" viewBox="0 0 800 1130">
  <rect width="800" height="1130" fill="#ffffff" />
  
  <!-- Header Text -->
  <text x="400" y="70" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#101828" text-anchor="middle">
    DYSLEXIALENS WRITING TEMPLATE
  </text>
  <text x="400" y="95" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#6a7282" text-anchor="middle">
    Tuliskan karakter di dalam kotak grid di bawah ini dengan jelas
  </text>

  <!-- Grid Area: 10 columns x 14 rows -->
  <!-- Column Width: 60px, Row Height: 60px -->
  <!-- Start X: 100px, Start Y: 150px -->
  <!-- End X: 700px, End Y: 990px -->
  <g stroke="#000000" stroke-width="2.5" fill="none">
    <!-- Outer Border -->
    <rect x="100" y="150" width="600" height="840" />

    <!-- Vertical Grid Lines (9 lines) -->
    <line x1="160" y1="150" x2="160" y2="990" />
    <line x1="220" y1="150" x2="220" y2="990" />
    <line x1="280" y1="150" x2="280" y2="990" />
    <line x1="340" y1="150" x2="340" y2="990" />
    <line x1="400" y1="150" x2="400" y2="990" />
    <line x1="460" y1="150" x2="460" y2="990" />
    <line x1="520" y1="150" x2="520" y2="990" />
    <line x1="580" y1="150" x2="580" y2="990" />
    <line x1="640" y1="150" x2="640" y2="990" />

    <!-- Horizontal Grid Lines (13 lines) -->
    <line x1="100" y1="210" x2="700" y2="210" />
    <line x1="100" y1="270" x2="700" y2="270" />
    <line x1="100" y1="330" x2="700" y2="330" />
    <line x1="100" y1="390" x2="700" y2="390" />
    <line x1="100" y1="450" x2="700" y2="450" />
    <line x1="100" y1="510" x2="700" y2="510" />
    <line x1="100" y1="570" x2="700" y2="570" />
    <line x1="100" y1="630" x2="700" y2="630" />
    <line x1="100" y1="690" x2="700" y2="690" />
    <line x1="100" y1="750" x2="700" y2="750" />
    <line x1="100" y1="810" x2="700" y2="810" />
    <line x1="100" y1="870" x2="700" y2="870" />
    <line x1="100" y1="930" x2="700" y2="930" />
  </g>

  <!-- Footer Instructions -->
  <text x="400" y="1040" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#98a2b3" text-anchor="middle">
    DyslexiaLens AI Handwriting Recognition System • Gunakan pencahayaan terang dan mode hitam-putih saat memfoto.
  </text>
</svg>
